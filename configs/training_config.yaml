# VT-Detection Training Configuration
# IEC 62304 Ref: SRS-TRAIN-002

# ──────────────────────────────────────────────────────────────────────────────
# Dataset Configuration
# ──────────────────────────────────────────────────────────────────────────────
dataset:
  # Path to MIT-BIH dataset (with raw ECG files)
  mit_path: "data/MIT_dataset"
  
  # Cache preprocessed data for faster iteration
  cache_dir: "data/processed/mit_cache"
  
  # Train/val/test split ratios (70/20/10)
  # test_size: First split off 10% for test, leaving 90% for train+val
  # val_size: From remaining 90%, take 22.2% for val (= 20% of original), leaving 70% for train
  test_size: 0.1
  val_size: 0.2222
  
  # Sampling fraction (1.0 = use all data; reduces for quick experiments)
  sample_fraction: 1.0
  
  # Force recompute from raw files (ignore cache)
  force_recompute: false


# ──────────────────────────────────────────────────────────────────────────────
# Model Configuration
# ──────────────────────────────────────────────────────────────────────────────
model:
  # Input shape: (time_steps, num_leads)
  # MIT-BIH: 10 seconds @ 360 Hz = 3600 samples, 2 leads
  input_shape: [3600, 2]
  
  # Dropout rate for regularization
  dropout_rate: 0.5
  
  # Adam optimizer learning rate
  learning_rate: 0.001


# ──────────────────────────────────────────────────────────────────────────────
# Training Configuration
# ──────────────────────────────────────────────────────────────────────────────
training:
  # Batch size for mini-batch SGD
  batch_size: 16
  
  # Maximum number of training epochs (increase for full dataset)
  epochs: 10

  # Rebalance loss contribution for imbalanced classes
  use_class_weights: true

  # Skip per-epoch checkpoint writes on low-disk machines.
  # Final model is still saved at the end of training.
  save_best_checkpoint: false

  # Early stopping patience
  early_stopping_patience: 3


# ──────────────────────────────────────────────────────────────────────────────
# MLflow Experiment Tracking
# ──────────────────────────────────────────────────────────────────────────────
mlflow:
  # Experiment name (groups related runs)
  experiment_name: "VT-Detection"
  
  # Run name (specific training run identifier)
  run_name: "baseline-vgg16-transfer-learning"
  
  # MLflow tracking URI (fresh SQLite DB - avoids file-store deprecation)
  tracking_uri: "sqlite:///mlflow_tracking.db"


# ──────────────────────────────────────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────────────────────────────────────
paths:
  checkpoint: "models/artifacts/vgg16_best.keras"
  logs: "logs/training/"
  plots: "plots/"
