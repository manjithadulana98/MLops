name: Train & Evaluate – VT Detection Pipeline

on:
  # Run manually from the Actions tab
  workflow_dispatch:
    inputs:
      sample_fraction:
        description: "Fraction of dataset to use (1.0 = full dataset)"
        required: false
        default: "1.0"
      epochs:
        description: "Number of training epochs"
        required: false
        default: "10"

  # Also run on push to main (with reduced dataset for speed)
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "configs/**"
      - "dvc.yaml"

jobs:
  train-and-evaluate:
    name: DVC Pipeline – Train & Evaluate
    runs-on: ubuntu-latest

    # Use larger runner if available on your GitHub plan
    # runs-on: ubuntu-latest-4-cores

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── DVC Remote Storage ──────────────────────────────────────────────
      # DVC needs access to data. Options:
      # A) Pull from DVC remote (S3 / GDrive) — recommended for full dataset
      # B) Download MIT-BIH directly from PhysioNet (shown below)
      - name: Download MIT-BIH dataset from PhysioNet (with retries)
        run: |
          mkdir -p data/MIT_dataset
          pip install wfdb

          # Retry the full download phase to survive transient PhysioNet/network timeouts.
          for attempt in 1 2 3 4 5; do
            echo "Dataset download attempt ${attempt}/5"
            python3 - 2>/dev/null << 'ENDPYTHON'
import os, time, wfdb
os.makedirs('data/MIT_dataset', exist_ok=True)
records = None
for idx_attempt in range(1, 6):
    try:
        records = wfdb.get_record_list('mitdb')
        break
    except Exception as exc:
        print(f"Record list attempt {idx_attempt}/5 failed: {exc}")
        if idx_attempt == 5:
            raise
        time.sleep(15 * idx_attempt)
for rec in records:
    for rec_attempt in range(1, 4):
        try:
            wfdb.dl_database('mitdb', dl_dir='data/MIT_dataset', records=[rec])
            print(f"Downloaded: {rec}")
            break
        except Exception as exc:
            print(f"Record {rec} attempt {rec_attempt}/3 failed: {exc}")
            if rec_attempt == 3:
                raise
            time.sleep(10 * rec_attempt)
print(f"Total records downloaded: {len(records)}")
ENDPYTHON
            if [ $? -eq 0 ]; then
              echo "Dataset download completed successfully."
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Dataset download failed after 5 attempts."
              exit 1
            fi
            sleep $((attempt * 20))
          done

      # ── Override config with workflow_dispatch inputs ───────────────────
      - name: Apply runtime config overrides
        env:
          SAMPLE_FRACTION: ${{ github.event.inputs.sample_fraction || '1.0' }}
          EPOCHS: ${{ github.event.inputs.epochs || '10' }}
        run: |
          python3 - << 'ENDPYTHON'
import yaml, os
with open('configs/training_config.yaml') as f:
    cfg = yaml.safe_load(f)
cfg['dataset']['sample_fraction'] = float(os.environ['SAMPLE_FRACTION'])
cfg['training']['epochs'] = int(os.environ['EPOCHS'])
with open('configs/training_config.yaml', 'w') as f:
    yaml.dump(cfg, f, default_flow_style=False, sort_keys=False)
print(f"Config: sample_fraction={cfg['dataset']['sample_fraction']}, epochs={cfg['training']['epochs']}")
ENDPYTHON

      # ── DVC Pipeline ────────────────────────────────────────────────────
      - name: DVC prepare (data preprocessing)
        run: dvc repro -s prepare --force

      - name: DVC train (VGG16 transfer learning)
        run: dvc repro -s train --force

      - name: DVC evaluate (metrics + plots)
        run: dvc repro -s evaluate --force

      # ── Upload artifacts ─────────────────────────────────────────────────
      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-report
          path: |
            reports/evaluation_report.json
            models/metrics.json
          retention-days: 30

      - name: Upload plots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-plots
          path: plots/
          retention-days: 30

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: vgg16-model
          path: models/artifacts/vgg16_best.keras
          retention-days: 30

      # ── Print final metrics summary ───────────────────────────────────────
      - name: Show training metrics
        if: always()
        run: |
          echo "=== TRAINING METRICS ==="
          cat models/metrics.json 2>/dev/null || echo "metrics.json not found"

      - name: Show evaluation summary
        if: always()
        run: |
          echo "=== EVALUATION SUMMARY ==="
          python3 - << 'ENDPYTHON'
import json, sys
try:
    with open('reports/evaluation_report.json') as f:
        r = json.load(f)
    b = r['binary_metrics']
    o = r.get('optimal_threshold_metrics', {})
    print(f"Sensitivity:  {b['sensitivity']:.4f}")
    print(f"Specificity:  {b['specificity']:.4f}")
    print(f"Precision:    {b['precision']:.4f}")
    print(f"F1-Score:     {b['f1_score']:.4f}")
    print(f"ROC AUC:      {r['roc_metrics']['roc_auc']:.4f}")
    if o:
        print(f"Best threshold F1: {o['threshold']:.3f} → Sensitivity {o['sensitivity']:.4f}, F1 {o['f1_score']:.4f}")
except Exception as e:
    print(f"Could not read report: {e}")
    sys.exit(0)
ENDPYTHON
